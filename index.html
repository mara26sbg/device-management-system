<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام العهد الإلكترونية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --whatsapp: #25D366;
            --dark: #1e293b;
            --light: #f8fafc;
            --border: #cbd5e1;
            --white: #ffffff;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--light); color: var(--dark); padding: 15px; }
        .container { max-width: 850px; margin: 0 auto; background: var(--white); border-radius: var(--radius); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid var(--border); }
        
        header { background: var(--primary); color: var(--white); padding: 20px; text-align: center; }
        .live-date { background: #1e4ed8; color: #bfdbfe; font-size: 0.9rem; padding: 5px; text-align: center; }

        .tabs { display: flex; background: #f1f5f9; border-bottom: 2px solid var(--border); overflow-x: auto; }
        .tab-btn { flex: 1; padding: 15px 10px; border: none; background: none; cursor: pointer; font-size: 15px; font-weight: 600; color: #64748b; min-width: 100px; transition: 0.3s; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: var(--white); }

        .tab-content { display: none; padding: 25px; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; text-decoration: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: white; border: 1px solid var(--border); color: var(--dark); }
        
        .notification-box { display: none; background: #f0fdf4; border: 1px solid #bbf7d0; padding: 20px; border-radius: 8px; margin-top: 20px; text-align: center; }
        .btn-wa { background: var(--whatsapp); color: white; padding: 12px 20px; border-radius: 6px; display: inline-flex; margin: 5px; }

        .card { background: #fff; border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 15px; position: relative; text-align: right; }
        .card h4 { color: var(--primary); margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .badge { position: absolute; left: 15px; top: 15px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge-active { background: #fef08a; color: #854d0e; }
        .badge-done { background: #dcfce7; color: #166534; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media print {
            body * { visibility: hidden; }
            #printable-area, #printable-area * { visibility: visible; }
            #printable-area { position: absolute; left: 0; top: 0; width: 100%; padding: 40px; border: 1px solid #000; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <header><h2>نظام العهد الإلكترونية</h2></header>
    <div class="live-date" id="displayDate">جاري تحميل التاريخ...</div>

    <div class="tabs no-print">
        <button class="tab-btn active" onclick="switchTab('borrow')"><i class="fas fa-plus"></i> استعارة</button>
        <button class="tab-btn" onclick="switchTab('active-view')"><i class="fas fa-desktop"></i> العمليات النشطة</button>
        <button class="tab-btn" onclick="switchTab('return-view')"><i class="fas fa-undo"></i> إرجاع</button>
        <button class="tab-btn" onclick="switchTab('history')"><i class="fas fa-history"></i> السجل</button>
    </div>

    <div id="borrow" class="tab-content active">
        <form id="borrowForm">
            <div class="form-group"><label>اسم المستلم:</label><input type="text" id="recName" required></div>
            <div class="form-group"><label>رقم هاتف المستلم:</label><input type="tel" id="recPhone" placeholder="9xxxxxxx" required></div>
            <div class="form-group"><label>اسم المُسلم:</label><input type="text" id="givName" required></div>
            <div class="form-group"><label>رقم هاتف المُسلم:</label><input type="tel" id="givPhone" required></div>
            <div class="form-group">
                <label>نوع الجهاز:</label>
                <select id="deviceName" required><option value="TAB">TAB</option></select>
            </div>
            <button type="submit" class="btn btn-primary" id="saveBtn"><i class="fas fa-save"></i> حفظ العهدة</button>
        </form>

        <div id="borrowWaBox" class="notification-box">
            <p style="color: var(--success); font-weight: bold; margin-bottom: 15px;">تم حفظ البيانات بنجاح!</p>
            <div id="lastActionCard" class="card" style="text-align: right; margin-bottom: 15px; border: 2px solid var(--success);">
                </div>
            <a href="#" id="waRecBtn" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i> مراسلة المستلم</a>
            <button class="btn btn-outline" onclick="printElement('lastActionCard')"><i class="fas fa-print"></i> طباعة إيصال الاستعارة</button>
        </div>
    </div>

    <div id="active-view" class="tab-content"><div id="activeList"></div></div>

    <div id="return-view" class="tab-content">
        <input type="text" id="searchReturn" placeholder="ابحث برقم هاتف المستلم..." onkeyup="filterReturn()" style="margin-bottom: 15px;">
        <div id="returnList"></div>
    </div>

    <div id="history" class="tab-content"><div id="historyList"></div></div>
</div>

<div id="printable-area" style="display: none;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBg4l5LFpt5piDbpfH3-XfV470vrEY_LIQ",
        authDomain: "device-management-e4049.firebaseapp.com",
        projectId: "device-management-e4049",
        storageBucket: "device-management-e4049.firebasestorage.app",
        messagingSenderId: "93864301196",
        appId: "1:93864301196:web:7a346a0f44ea17ab4121a9",
        measurementId: "G-VL6WEGTHVK"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // دالة التاريخ المحدثة
    function getFullDate() {
        return new Date().toLocaleDateString('ar-OM', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }
    
    // عرض التاريخ فور فتح الصفحة
    document.getElementById('displayDate').innerText = getFullDate();

    window.switchTab = (id) => {
        document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
        const btn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.onclick.toString().includes(id));
        if(btn) btn.classList.add('active');
        document.getElementById(id).classList.add('active');
        if(id === 'active-view') fetchActive();
        if(id === 'return-view') fetchForReturn();
        if(id === 'history') fetchHistory();
    };

    // حفظ الاستعارة
    document.getElementById('borrowForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        
        const data = {
            recName: document.getElementById('recName').value,
            recPhone: document.getElementById('recPhone').value,
            givName: document.getElementById('givName').value,
            givPhone: document.getElementById('givPhone').value,
            device: document.getElementById('deviceName').value,
            borrowDate: getFullDate(),
            timestamp: Date.now(),
            status: 'active'
        };

        try {
            await addDoc(collection(db, "orders"), data);
            
            // تحديث بطاقة الطباعة الفورية
            document.getElementById('lastActionCard').innerHTML = `
                <h4>إيصال استعارة عهدة</h4>
                <p><strong>الجهاز:</strong> ${data.device}</p>
                <p><strong>المستلم:</strong> ${data.recName}</p>
                <p><strong>التاريخ:</strong> ${data.borrowDate}</p>
            `;

            // إصلاح رابط الواتساب للكمبيوتر والهاتف
            const msg = `نظام العهد: تم تسجيل جهاز (${data.device}) بعهدة ${data.recName} بتاريخ ${data.borrowDate}.`;
            const waUrl = `https://api.whatsapp.com/send?phone=968${data.recPhone}&text=${encodeURIComponent(msg)}`;
            document.getElementById('waRecBtn').href = waUrl;
            
            document.getElementById('borrowWaBox').style.display = 'block';
            document.getElementById('borrowForm').reset();
            alert("تم الحفظ بنجاح");
        } catch (err) { alert("خطأ في قاعدة البيانات"); }
        btn.disabled = false;
    });

    // جلب العمليات النشطة (بدون orderBy لتجنب مشكلة الـ Index)
    async function fetchActive() {
        const container = document.getElementById('activeList');
        container.innerHTML = 'جاري التحميل...';
        try {
            const snap = await getDocs(query(collection(db, "orders"), where("status", "==", "active")));
            let docs = [];
            snap.forEach(d => docs.push({id: d.id, ...d.data()}));
            docs.sort((a, b) => b.timestamp - a.timestamp); // ترتيب يدوي لضمان الظهور

            container.innerHTML = docs.length === 0 ? '<p style="text-align:center">لا توجد عمليات</p>' : '';
            docs.forEach(r => {
                container.innerHTML += `
                    <div class="card" id="card-${r.id}">
                        <span class="badge badge-active">نشط</span>
                        <h4>جهاز: ${r.device}</h4>
                        <p><strong>المستلم:</strong> ${r.recName}</p>
                        <p><strong>التاريخ:</strong> ${r.borrowDate}</p>
                        <button class="btn btn-outline" onclick="printElement('card-${r.id}')"><i class="fas fa-print"></i> طباعة</button>
                    </div>`;
            });
        } catch(e) { container.innerHTML = "خطأ في جلب البيانات"; }
    }

    window.fetchForReturn = async () => {
        const container = document.getElementById('returnList');
        container.innerHTML = 'جاري التحميل...';
        const snap = await getDocs(query(collection(db, "orders"), where("status", "==", "active")));
        container.innerHTML = '';
        snap.forEach(d => {
            const r = d.data();
            const div = document.createElement('div');
            div.className = 'card return-item';
            div.dataset.phone = r.recPhone;
            div.innerHTML = `
                <h4>جهاز: ${r.device}</h4>
                <p><strong>المستلم:</strong> ${r.recName} (${r.recPhone})</p>
                <p><strong>تاريخ الاستلام:</strong> ${r.borrowDate}</p>
                <button class="btn btn-success" id="btn-${d.id}"><i class="fas fa-check"></i> تأكيد الإرجاع</button>
            `;
            container.appendChild(div);
            document.getElementById(`btn-${d.id}`).onclick = () => confirmReturn(d.id, r.recPhone, r.device, r.recName);
        });
    };

    window.confirmReturn = async (id, phone, device, name) => {
        if(!confirm(`هل استلمت ${device} من ${name}؟`)) return;
        const rDate = getFullDate();
        await updateDoc(doc(db, "orders", id), { status: 'done', returnDate: rDate, returnTimestamp: Date.now() });
        
        const msg = `نظام العهد: تم استلام (${device}) من ${name} بتاريخ ${rDate}. شكراً لكم.`;
        window.open(`https://api.whatsapp.com/send?phone=968${phone}&text=${encodeURIComponent(msg)}`, '_blank');
        fetchForReturn();
    };

    async function fetchHistory() {
        const container = document.getElementById('historyList');
        container.innerHTML = 'جاري التحميل...';
        const snap = await getDocs(query(collection(db, "orders"), where("status", "==", "done")));
        let docs = [];
        snap.forEach(d => docs.push({id: d.id, ...d.data()}));
        docs.sort((a, b) => b.returnTimestamp - a.returnTimestamp);

        container.innerHTML = docs.length === 0 ? '<p style="text-align:center">السجل فارغ</p>' : '';
        docs.forEach(r => {
            container.innerHTML += `
                <div class="card" id="card-${r.id}">
                    <span class="badge badge-done">مكتمل</span>
                    <h4>جهاز: ${r.device}</h4>
                    <p><strong>المستلم:</strong> ${r.recName}</p>
                    <p><strong>تاريخ الاستعارة:</strong> ${r.borrowDate}</p>
                    <p><strong>تاريخ الإرجاع:</strong> ${r.returnDate}</p>
                    <button class="btn btn-outline" onclick="printElement('card-${r.id}')"><i class="fas fa-print"></i> طباعة</button>
                </div>`;
        });
    }

    // دالة الطباعة المخصصة
    window.printElement = (elementId) => {
        const content = document.getElementById(elementId).innerHTML;
        const printArea = document.getElementById('printable-area');
        printArea.innerHTML = `
            <div style="direction: rtl; text-align: center; border: 2px solid #000; padding: 20px;">
                <h2 style="margin-bottom: 20px;">إيصال نظام العهد الإلكترونية</h2>
                <hr>
                <div style="text-align: right; margin-top: 20px; font-size: 1.2rem;">
                    ${content}
                </div>
                <div style="margin-top: 40px; border-top: 1px solid #eee; padding-top: 10px; font-size: 0.8rem;">
                    تمت الطباعة بتاريخ: ${getFullDate()}
                </div>
            </div>
        `;
        window.print();
    };

    window.filterReturn = () => {
        const val = document.getElementById('searchReturn').value;
        document.querySelectorAll('.return-item').forEach(i => i.style.display = i.dataset.phone.includes(val) ? 'block' : 'none');
    };
</script>
</body>
</html>
