<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام العهد الإلكترونية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --whatsapp: #25D366;
            --dark: #1e293b;
            --light: #f8fafc;
            --border: #cbd5e1;
            --white: #ffffff;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--light); color: var(--dark); padding: 15px; }
        .container { max-width: 850px; margin: 0 auto; background: var(--white); border-radius: var(--radius); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid var(--border); }
        
        header { background: var(--primary); color: var(--white); padding: 25px; text-align: center; }
        .tabs { display: flex; background: #f1f5f9; border-bottom: 2px solid var(--border); overflow-x: auto; }
        .tab-btn { flex: 1; padding: 15px 10px; border: none; background: none; cursor: pointer; font-size: 15px; font-weight: 600; color: #64748b; min-width: 100px; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: var(--white); }

        .tab-content { display: none; padding: 25px; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: white; border: 1px solid var(--border); color: var(--dark); }
        
        .notification-box { display: none; background: #f0fdf4; border: 1px solid #bbf7d0; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; }
        .btn-wa { background: var(--whatsapp); color: white; padding: 10px 20px; text-decoration: none; border-radius: 6px; display: inline-flex; align-items: center; gap: 8px; }

        .card { background: #fff; border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 15px; position: relative; }
        .card h4 { color: var(--primary); margin-bottom: 10px; }
        .badge { position: absolute; left: 15px; top: 15px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge-active { background: #fef08a; color: #854d0e; }
        .badge-done { background: #dcfce7; color: #166534; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media print {
            body * { visibility: hidden; }
            .card, .card * { visibility: visible; }
            .card { position: absolute; left: 0; top: 0; width: 100%; border: none; }
            .btn { display: none !important; }
            .badge { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <header><h2>نظام العهد الإلكترونية</h2></header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('borrow')"><i class="fas fa-plus"></i> استعارة</button>
        <button class="tab-btn" onclick="switchTab('active-view')"><i class="fas fa-desktop"></i> العمليات النشطة</button>
        <button class="tab-btn" onclick="switchTab('return-view')"><i class="fas fa-undo"></i> إرجاع</button>
        <button class="tab-btn" onclick="switchTab('history')"><i class="fas fa-history"></i> السجل</button>
    </div>

    <div id="borrow" class="tab-content active">
        <form id="borrowForm">
            <div class="form-group"><label>اسم المستلم:</label><input type="text" id="recName" required></div>
            <div class="form-group"><label>رقم هاتف المستلم:</label><input type="tel" id="recPhone" placeholder="9xxxxxxx" required></div>
            <div class="form-group"><label>اسم المُسلم:</label><input type="text" id="givName" required></div>
            <div class="form-group"><label>رقم هاتف المُسلم:</label><input type="tel" id="givPhone" required></div>
            <div class="form-group">
                <label>نوع الجهاز:</label>
                <select id="deviceName" required>
                    <option value="TAB">TAB</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" id="saveBtn"><i class="fas fa-save"></i> حفظ </button>
        </form>

        <div id="borrowWaBox" class="notification-box">
            <p style="color: var(--success); font-weight: bold; margin-bottom: 15px;">تم حفظ البيانات بنجاح!</p>
            <a href="#" id="waRecBtn" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i> مراسلة المستلم</a>
        </div>
    </div>

    <div id="active-view" class="tab-content"><div id="activeList"></div></div>

    <div id="return-view" class="tab-content">
        <input type="text" id="searchReturn" placeholder="ابحث برقم هاتف المستلم..." onkeyup="filterReturn()" style="margin-bottom: 15px;">
        <div id="returnList"></div>
    </div>

    <div id="history" class="tab-content"><div id="historyList"></div></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBg4l5LFpt5piDbpfH3-XfV470vrEY_LIQ",
        authDomain: "device-management-e4049.firebaseapp.com",
        projectId: "device-management-e4049",
        storageBucket: "device-management-e4049.firebasestorage.app",
        messagingSenderId: "93864301196",
        appId: "1:93864301196:web:7a346a0f44ea17ab4121a9",
        measurementId: "G-VL6WEGTHVK"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // دالة جلب التاريخ واليوم بالعربي
    function getFullDate() {
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        return new Date().toLocaleDateString('ar-OM', options);
    }

    window.switchTab = (id) => {
        document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
        const btn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.onclick.toString().includes(id));
        if(btn) btn.classList.add('active');
        document.getElementById(id).classList.add('active');
        if(id === 'active-view') fetchActive();
        if(id === 'return-view') fetchForReturn();
        if(id === 'history') fetchHistory();
    };

    document.getElementById('borrowForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        
        const data = {
            recName: document.getElementById('recName').value,
            recPhone: document.getElementById('recPhone').value,
            givName: document.getElementById('givName').value,
            givPhone: document.getElementById('givPhone').value,
            device: document.getElementById('deviceName').value,
            borrowDate: getFullDate(),
            timestamp: Date.now(),
            status: 'active'
        };

        try {
            await addDoc(collection(db, "orders"), data);
            const msg = `تأكيد استعارة: تم تسجيل جهاز (${data.device}) بعهدة المستلم: ${data.recName} بتاريخ ${data.borrowDate}.`;
            document.getElementById('waRecBtn').href = `https://wa.me/968${data.recPhone}?text=${encodeURIComponent(msg)}`;
            document.getElementById('borrowWaBox').style.display = 'block';
            document.getElementById('borrowForm').reset();
            alert("تم الحفظ بنجاح");
        } catch (err) { alert("حدث خطأ في الحفظ"); }
        btn.disabled = false;
    });

    async function fetchActive() {
        const container = document.getElementById('activeList');
        container.innerHTML = 'جاري التحميل...';
        try {
            const q = query(collection(db, "orders"), where("status", "==", "active"), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            container.innerHTML = snap.empty ? '<p style="text-align:center">لا توجد عمليات</p>' : '';
            snap.forEach(d => {
                const r = d.data();
                container.innerHTML += `
                    <div class="card">
                        <span class="badge badge-active">نشط</span>
                        <h4>جهاز: ${r.device}</h4>
                        <p><strong>المستلم:</strong> ${r.recName}</p>
                        <p><strong>التاريخ:</strong> ${r.borrowDate}</p>
                        <button class="btn btn-outline" onclick="window.print()"><i class="fas fa-print"></i> طباعة الطلب</button>
                    </div>`;
            });
        } catch(e) { container.innerHTML = "خطأ في جلب البيانات"; }
    }

    window.fetchForReturn = async () => {
        const container = document.getElementById('returnList');
        container.innerHTML = 'جاري التحميل...';
        const q = query(collection(db, "orders"), where("status", "==", "active"), orderBy("timestamp", "desc"));
        const snap = await getDocs(q);
        container.innerHTML = '';
        snap.forEach(d => {
            const r = d.data();
            const div = document.createElement('div');
            div.className = 'card return-item';
            div.dataset.phone = r.recPhone;
            div.innerHTML = `
                <h4>جهاز: ${r.device}</h4>
                <p><strong>المستلم:</strong> ${r.recName} (${r.recPhone})</p>
                <button class="btn btn-success" id="btn-${d.id}"><i class="fas fa-check"></i> تأكيد الإرجاع</button>
            `;
            container.appendChild(div);
            document.getElementById(`btn-${d.id}`).onclick = () => confirmReturn(d.id, r.recPhone, r.device);
        });
    };

    window.confirmReturn = async (id, phone, device) => {
        if(!confirm("تأكيد استلام الجهاز؟")) return;
        const returnDate = getFullDate();
        await updateDoc(doc(db, "orders", id), { status: 'done', returnDate: returnDate, returnTimestamp: Date.now() });
        const msg = `تم إرجاع الجهاز (${device}) بنجاح بتاريخ ${returnDate}. شكراً لكم.`;
        window.open(`https://wa.me/968${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        fetchForReturn();
    };

    async function fetchHistory() {
        const container = document.getElementById('historyList');
        container.innerHTML = 'جاري التحميل...';
        const q = query(collection(db, "orders"), where("status", "==", "done"), orderBy("returnTimestamp", "desc"));
        const snap = await getDocs(q);
        container.innerHTML = snap.empty ? '<p style="text-align:center">السجل فارغ</p>' : '';
        snap.forEach(d => {
            const r = d.data();
            container.innerHTML += `
                <div class="card">
                    <span class="badge badge-done">مكتمل</span>
                    <h4>جهاز: ${r.device}</h4>
                    <p><strong>المستلم:</strong> ${r.recName}</p>
                    <p><strong>الاستعارة:</strong> ${r.borrowDate}</p>
                    <p><strong>الإرجاع:</strong> ${r.returnDate}</p>
                    <button class="btn btn-outline" onclick="window.print()"><i class="fas fa-print"></i> طباعة السجل</button>
                </div>`;
        });
    }

    window.filterReturn = () => {
        const val = document.getElementById('searchReturn').value;
        document.querySelectorAll('.return-item').forEach(i => i.style.display = i.dataset.phone.includes(val) ? 'block' : 'none');
    };
</script>
</body>
</html>
